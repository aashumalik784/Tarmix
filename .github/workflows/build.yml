name: Build Tremix APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: chmod +x gradlew
    - run: ./gradlew assembleRelease
    - run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/Tremix-v0.118.0.apk
    - uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/Tremix-v0.118.0.apk
        name: Tremix v0.118.0
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
